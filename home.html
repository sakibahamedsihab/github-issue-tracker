<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <nav class="py-5 px-15 mx-auto shadow-sm sticky top-0 flex flex-col gap-4 sm:flex-row  justify-between">
            <div class="logo flex justify-center sm:justify-start items-center gap-2">
                <div class="max-w-9">
                    <img src="./assets/github-logo.png" alt="">
                </div>
                <h2 class="text-2xl font-semibold hidden sm:block">GitHub Issues Tracker</h2>
            </div>

            <div class="flex gap-3">
                <input class="py-1 px-3 rounded-md text-xs sm:text-xl border-gray-300" type="text" placeholder="Search Issues">
                <button class="btn btn-primary text-xs sm:text-2xl"><span class="text-xs sm:text-2xl">+</span> New Issues</button>
            </div>
        </nav>
    </header>

    <main class="bg-base-300 min-h-screen p-5">
        <section id="all-tab" class="p-5 max-w-[350px] sm:max-w-[1140px] mx-auto bg-white shadow-md">
            <div class="flex justify-center sm:justify-between ">
                <div>
                    <button class="navBtn btn btn-primary">All</button>
                    <button class="navBtn btn">Open</button>
                    <button class="navBtn btn">Closed</button>
                </div> 
            </div>    
        </section>

        <section class="p-5 max-w-[1140px] mx-auto bg-white shadow-md mt-5">
            <div class="flex justify-between">
                <div class="flex items-center gap-3">
                    <div>
                        <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h2 id="total-issue" class="text-2xl font-bold"></h2>
                        <p class="text-[14px] text-gray-400">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex gap-2">
                        <div class="flex items-center gap-1">
                            <div class="w-3 h-3 rounded-full bg-green-500 text-green-500"></div>
                            <p>Open</p>
                        </div>
                        <div class="flex items-center gap-1">
                            <div class="w-3 h-3 rounded-full bg-red-500 text-red-500"></div>
                            <p>Closed</p>
                        </div>
                </div>
            </div>
        </section>
        <hr class="max-w-[1140px] mx-auto text-gray-300">
        <section id="all-card-container" class="max-w-[1140px] mx-auto bg-gray-50 p-5 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
            <!-- all cards -->
             
           

        </section>
    </main> 
    
    <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
<dialog id="issue-modal" class="modal">
  <div class="modal-box">
    <div id="modal-content" class="flex flex-col gap-3">
        <!-- Modal Content -->
    </div>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn border-none btn-primary">Close</button>
      </form>
    </div>
  </div>
</dialog>
    <script src="script.js"></script>
</body>
</html>

    <img src="./assets/Vector.png" alt="">
